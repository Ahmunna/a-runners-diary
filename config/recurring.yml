production:
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12
  check_missed_training_days:
    class: Coach::CheckMissedDaysJob
    schedule: every day at 11pm
  ensure_strava_webhook_subscription:
    class: Strava::EnsureWebhookSubscriptionJob
    schedule: every day at 3am
  daily_checkin_sweep:
    class: Coach::DailyCheckInSweepJob
    schedule: every hour

development:
  check_missed_training_days:
    class: Coach::CheckMissedDaysJob
    schedule: every day at 11pm
  daily_checkin_sweep:
    class: Coach::DailyCheckInSweepJob
    schedule: every hour
