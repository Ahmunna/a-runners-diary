<svg width="512" height="512" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <rect width="100" height="100" fill="#0f1f30"/>

  <g transform="translate(16.07,12.56) scale(0.78)">
    <g stroke="#ffffff" stroke-width="10.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <!-- torso -->
      <line x1="54" y1="27" x2="43" y2="50"/>
