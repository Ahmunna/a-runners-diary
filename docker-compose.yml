services:
  db:
    image: postgres:16
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: runners_diary
      POSTGRES_PASSWORD: password
      POSTGRES_DB: runners_diary_development
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U runners_diary"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: >
      bash -c "
        bundle exec rails db:prepare &&
        bundle exec rails tailwindcss:build &&
        bundle exec rails server -b 0.0.0.0 -p 3000
      "
    volumes:
      - .:/rails
      - bundle_cache:/usr/local/bundle
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://runners_diary:password@db:5432/runners_diary_development
      SECRET_KEY_BASE: dev_secret_key_base_change_in_production_000000000000000000000000000000000
      RAILS_ENV: development
      SOLID_QUEUE_IN_PUMA: "true"
      STRAVA_CLIENT_ID: ${STRAVA_CLIENT_ID}
      STRAVA_CLIENT_SECRET: ${STRAVA_CLIENT_SECRET}
      STRAVA_WEBHOOK_VERIFY_TOKEN: ${STRAVA_WEBHOOK_VERIFY_TOKEN}

volumes:
  postgres_data:
  bundle_cache:
